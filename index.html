<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick Drum Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 이미지와 같은 부드러운 오프화이트 배경 및 상단 주황색 그래디언트 글로우 */
            background-color: #fafafa;
            background-image: radial-gradient(circle at top, rgba(255, 127, 80, 0.1) 0%, rgba(250, 250, 250, 0) 70%);
            font-family: 'Inter', sans-serif;
            color: #333;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            /* 대담한 헤더 텍스트 */
            font-size: 3rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            /* 부드러운 보디 텍스트 */
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 50px;
            font-weight: 400;
            line-height: 1.6;
        }

        .main-link {
            text-decoration: none;
            display: inline-block;
            margin-bottom: 60px;
        }

        .main-button {
            /* 수정된 주황색 버튼 스타일 */
            display: inline-block;
            padding: 18px 60px;
            background-color: #ff7f50;
            color: white;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 6px 15px rgba(255, 127, 80, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .main-button:hover {
            background-color: #ff8e66;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 127, 80, 0.5);
        }

        /* 새로운 하단 텍스트 스타일 */
        .secondary-text {
            font-size: 0.9rem;
            font-weight: 700;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nick Drum Challenge</h1>
        <p class="subtitle">Ready to play the drums? Let's begin the rhythm.</p>

        <a href="https://nick-drum-challenge2-262249518675.us-west1.run.app/" class="main-link">
            <div class="main-button">LAUNCH THE CHALLENGE</div>
        </a>

        <p class="secondary-text">CONTINUE IN BROWSER MODE</p>
    </div>

</body>
</html>
